# ─── Log Filter Configuration Example ───────────────────────────────────────
# Usage: python filter_logs.py -c filter.example.yaml

# Source directories (from a previous capture)
input_dir: ./logs/all/captured
access_input_dir: ./logs/all/access

# Output directories (filtered results)
output_dir: ./logs/githubcopilot-filtered/captured
access_output_dir: ./logs/githubcopilot-filtered/access

# Time range (optional, omit to include all)
from: "2026-03-14T17:05"

# Request filters:
# - array items are OR
# - fields inside one item are AND
# - headers_patterns items are OR
# - header entries inside one headers_patterns item are AND
request_filters:
  - domains: ["api.github.com", "copilot-proxy.githubusercontent.com", "api.individual.githubcopilot.com", "api.business.githubcopilot.com", "api.enterprise.githubcopilot.com", "proxy.enterprise.githubcopilot.com", "githubcopilot.com"]
    methods: ["POST"]
    # path_patterns: ["/chat/completions", "/v1/messages"]
    headers_patterns:
      - vscode-sessionid: "2e67d240-97f3-4e51-81cb-d968001cefd71773466221936"
